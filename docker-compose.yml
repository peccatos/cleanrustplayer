services:
  postgres:
    image: postgres:16-alpine
    container_name: replaycore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: replaycore
      POSTGRES_USER: replaycore
      POSTGRES_PASSWORD: replaycore
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - replaycore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replaycore -d replaycore"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  replaycore_postgres_data:
