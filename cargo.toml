[package]
name = "rust-player"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
rodio = "0.22.2"
lofty = "0.23.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
urlencoding = "2"
scraper = "0.24"
