[package]
name = "rust-player"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
blake3 = "1"
aes-gcm = "0.10"
base64 = "0.22"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
http-body-util = "0.1"
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
jsonschema = { version = "0.45", default-features = false }
rodio = "0.22.2"
lofty = "0.23.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.13", default-features = false, features = ["blocking", "rustls"] }
rand = "0.10.0"
sqlx = { version = "0.8.6", features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "sqlite", "migrate", "json", "derive", "chrono"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time"] }
urlencoding = "2"
scraper = "0.26"
shell-words = "1"
dotenvy = "0.15"
