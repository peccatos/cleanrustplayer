[package]
name = "rust-player"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
axum = "0.8"
blake3 = "1"
aes-gcm = "0.10"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
jsonschema = { version = "0.45", default-features = false }
rodio = "0.22.2"
lofty = "0.23.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
rand = "0.8"
sqlx = { version = "0.8.6", features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "migrate", "json", "derive", "chrono"] }
tokio = { version = "1", features = ["net", "rt-multi-thread", "sync", "time"] }
tower-http = { version = "0.6", features = ["cors"] }
urlencoding = "2"
scraper = "0.24"
shell-words = "1"
dotenvy = "0.15"
